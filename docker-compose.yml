services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bookstore
      POSTGRES_PASSWORD: bookstore
      POSTGRES_DB: bookstore
    ports:
      - "5434:5432"
    volumes:
      - bookstore_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookstore -d bookstore"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://bookstore:bookstore@db:5432/bookstore
      PORT: 3000
      CLIENT_URL: http://localhost:3000
      FALLBACK_RATES_JSON: '{"EUR":0.85,"MXN":18,"GBP":0.79,"ARS":950}'
    depends_on:
      db:
        condition: service_healthy

volumes:
  bookstore_pgdata:
